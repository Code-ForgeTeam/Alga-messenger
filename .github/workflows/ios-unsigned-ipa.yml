name: Build unsigned iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-ios-unsigned:
    runs-on: macos-14
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare production env
        shell: bash
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
          VITE_APP_HOST: ${{ vars.VITE_APP_HOST }}
          VITE_FORCE_HTTPS: ${{ vars.VITE_FORCE_HTTPS }}
          VITE_APP_VERSION_NAME: ${{ vars.VITE_APP_VERSION_NAME }}
          VITE_APP_VERSION_CODE: ${{ vars.VITE_APP_VERSION_CODE }}
        run: |
          if [ -n "$VITE_API_BASE_URL" ]; then
            printf '%s\n' \
              "VITE_API_BASE_URL=$VITE_API_BASE_URL" \
              "VITE_SOCKET_URL=$VITE_SOCKET_URL" \
              "VITE_APP_HOST=$VITE_APP_HOST" \
              "VITE_FORCE_HTTPS=${VITE_FORCE_HTTPS:-1}" \
              "VITE_APP_VERSION_NAME=${VITE_APP_VERSION_NAME:-1.0.0}" \
              "VITE_APP_VERSION_CODE=${VITE_APP_VERSION_CODE:-1}" \
              > .env.production
          elif [ -f .env.production ]; then
            echo 'Using committed .env.production'
          else
            cp .env.production.example .env.production
          fi

      - name: Build web bundle
        run: npm run build

      - name: Add iOS platform
        shell: bash
        run: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Allow HTTP backend for iOS (ATS)
        shell: bash
        run: |
          PLIST="ios/App/App/Info.plist"
          test -f "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent bool true" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoadsInWebContent true" "$PLIST" || true

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Build unsigned app bundle
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        shell: bash
        run: |
          APP_PATH="ios/App/build/Build/Products/Release-iphoneos/App.app"
          test -d "$APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/App.app
          zip -qry AlgaMessenger-unsigned.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlgaMessenger-unsigned-ipa
          path: AlgaMessenger-unsigned.ipa
          if-no-files-found: error

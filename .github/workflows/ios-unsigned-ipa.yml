name: Build unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Capacitor iOS platform
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Build unsigned .app (no signing)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath ../../build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Package unsigned .ipa
        run: |
          mkdir -p build/ipa/Payload
          APP_PATH=$(find build/ios/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found after xcodebuild"
            exit 1
          fi
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../AlgaMessenger-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlgaMessenger-unsigned-ipa
          path: build/AlgaMessenger-unsigned.ipa
          if-no-files-found: error

name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare production env
        shell: bash
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL }}
          VITE_APP_HOST: ${{ vars.VITE_APP_HOST }}
          VITE_FORCE_HTTPS: ${{ vars.VITE_FORCE_HTTPS }}
          VITE_APP_VERSION_NAME: ${{ vars.VITE_APP_VERSION_NAME }}
          VITE_APP_VERSION_CODE: ${{ vars.VITE_APP_VERSION_CODE }}
        run: |
          if [ -n "$VITE_API_BASE_URL" ]; then
            printf '%s\n' \
              "VITE_API_BASE_URL=$VITE_API_BASE_URL" \
              "VITE_SOCKET_URL=$VITE_SOCKET_URL" \
              "VITE_APP_HOST=$VITE_APP_HOST" \
              "VITE_FORCE_HTTPS=${VITE_FORCE_HTTPS:-1}" \
              "VITE_APP_VERSION_NAME=${VITE_APP_VERSION_NAME:-1.0.0}" \
              "VITE_APP_VERSION_CODE=${VITE_APP_VERSION_CODE:-1}" \
              > .env.production
          elif [ -f .env.production ]; then
            echo 'Using committed .env.production'
          else
            cp .env.production.example .env.production
          fi

      - name: Build web bundle
        run: npm run build

      - name: Add Android platform
        shell: bash
        run: |
          if [ ! -d android/app ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlgaMessenger-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

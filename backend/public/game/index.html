<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Vita Mahjong Style</title>
  <style>
    :root {
      --vh: 1vh;
      --bg: #eef5fc;
      --panel: #ffffff;
      --line: #d9e6f2;
      --ink: #203248;
      --soft: #6f8299;
      --accent: #4b8fe9;
      --shadow: 0 12px 28px rgba(35, 62, 92, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: calc(var(--vh) * 100);
      overflow: hidden;
      font-family: "SF Pro Text", "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff, var(--bg));
      color: var(--ink);
      overscroll-behavior: none;
    }

    .hidden { display: none !important; }

    .menu {
      width: 100%;
      height: calc(var(--vh) * 100);
      display: grid;
      place-items: center;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px calc(env(safe-area-inset-bottom, 0px) + 16px);
    }

    .menu-card {
      width: min(560px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      text-align: center;
    }

    .menu h1 { margin: 0; font-size: clamp(26px, 6vw, 40px); }
    .menu p { margin: 8px 0 16px; color: var(--soft); }

    .btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: #fff;
      color: var(--ink);
      transition: 120ms ease;
    }

    .btn:active { transform: scale(0.97); }

    .btn.primary {
      background: linear-gradient(180deg, #6aa8f6, #3f84e8);
      border-color: #3f84e8;
      color: #fff;
    }

    .meta {
      margin-top: 12px;
      color: var(--soft);
      font-size: 14px;
      line-height: 1.5;
    }

    .game {
      position: relative;
      width: 100%;
      height: calc(var(--vh) * 100);
      padding:
        calc(env(safe-area-inset-top, 0px) + 8px)
        max(env(safe-area-inset-right, 0px), 8px)
        calc(env(safe-area-inset-bottom, 0px) + 8px)
        max(env(safe-area-inset-left, 0px), 8px);
    }

    .board-shell {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      touch-action: none;
    }

    .board {
      position: absolute;
      left: 0;
      top: 0;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      will-change: transform;
    }

    .back {
      position: absolute;
      left: calc(max(env(safe-area-inset-left, 0px), 8px) + 8px);
      top: calc(env(safe-area-inset-top, 0px) + 16px);
      z-index: 20;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.95);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(30, 54, 84, 0.18);
    }

    .hud {
      position: absolute;
      right: calc(max(env(safe-area-inset-right, 0px), 8px) + 8px);
      top: calc(env(safe-area-inset-top, 0px) + 14px);
      z-index: 20;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      color: #35506d;
      font-weight: 800;
      font-size: 12px;
      padding: 7px 10px;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(30, 54, 84, 0.16);
      max-width: min(76vw, 360px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile {
      position: absolute;
      border: 1px solid #cedced;
      border-radius: 10px;
      background: linear-gradient(180deg, #ffffff, #f5f9ff);
      box-shadow: 0 4px 10px rgba(25, 47, 74, 0.14);
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
      justify-items: center;
      color: #1f2f44;
      padding: 2px;
      font-weight: 800;
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    .tile.blocked {
      background: linear-gradient(180deg, #eef3f8, #e3ebf5);
      filter: saturate(0.9);
    }

    .tile.selected {
      outline: 2px solid #4b8fe9;
      transform: translateY(-2px);
    }

    .tile .tiny { font-size: 10px; }
    .tile .face { font-size: 22px; line-height: 1; }
    .tile .tiny.bottom { transform: rotate(180deg); }
    .red { color: #cc4b4b; }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(9, 17, 29, 0.42);
      z-index: 100;
      padding: 16px;
    }

    .overlay.show { display: grid; }

    .modal {
      width: min(420px, 100%);
      background: #fff;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 16px;
      text-align: center;
    }

    .modal p { color: var(--soft); }

    .modal .row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 760px) {
      .game {
        padding:
          calc(env(safe-area-inset-top, 0px) + 6px)
          max(env(safe-area-inset-right, 0px), 6px)
          calc(env(safe-area-inset-bottom, 0px) + 6px)
          max(env(safe-area-inset-left, 0px), 6px);
      }

      .board-shell { border-radius: 14px; }

      .back {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }

      .hud {
        font-size: 11px;
        padding: 6px 9px;
      }

      .tile { border-radius: 8px; }
      .tile .tiny { font-size: 9px; }
      .tile .face { font-size: 19px; }
    }
  </style>
</head>
<body>
  <section id="menuScreen" class="menu">
    <div class="menu-card">
      <h1>Vita Mahjong Style</h1>
      <p>Классический режим</p>
      <button id="startBtn" class="btn primary">Начать</button>
      <div id="menuMeta" class="meta"></div>
    </div>
  </section>

  <section id="gameScreen" class="game hidden">
    <button id="backBtn" class="back" aria-label="Назад">←</button>
    <div id="hud" class="hud"></div>
    <div class="board-shell">
      <div id="board" class="board"></div>
    </div>
  </section>

  <div id="overlay" class="overlay">
    <div class="modal">
      <h2 id="modalTitle">Уровень пройден</h2>
      <p id="modalText"></p>
      <div class="row">
        <button id="nextBtn" class="btn primary">Следующий уровень</button>
        <button id="menuBtn" class="btn">В меню</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const BEST_KEY = 'mahjong.best.v1';
      const SCORE_KEY = 'mahjong.score.v1';
      const LAYOUTS = ['turtle', 'castle', 'fortress', 'dragon'];
      const SUIT_COLORS = {
        dots: 'black',
        bamboo: 'black',
        characters: 'black',
        wind: 'black',
        dragon: 'red',
        flower: 'red',
        season: 'black',
      };

      const state = {
        level: 1,
        tiles: [],
        selected: null,
        score: Number(localStorage.getItem(SCORE_KEY) || 0),
        seconds: 0,
        running: false,
        timerId: null,
        best: Number(localStorage.getItem(BEST_KEY) || 0),
        renderRaf: 0,
      };

      const el = {
        menu: document.getElementById('menuScreen'),
        menuMeta: document.getElementById('menuMeta'),
        game: document.getElementById('gameScreen'),
        board: document.getElementById('board'),
        startBtn: document.getElementById('startBtn'),
        backBtn: document.getElementById('backBtn'),
        overlay: document.getElementById('overlay'),
        modalTitle: document.getElementById('modalTitle'),
        modalText: document.getElementById('modalText'),
        nextBtn: document.getElementById('nextBtn'),
        menuBtn: document.getElementById('menuBtn'),
        hud: document.getElementById('hud'),
      };

      let suppressClickUntil = 0;

      function updateViewportVar() {
        const vv = window.visualViewport;
        const h = (vv ? vv.height : window.innerHeight) * 0.01;
        document.documentElement.style.setProperty('--vh', `${h}px`);
      }

      function shuffle(list) {
        const a = list.slice();
        for (let i = a.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function fmt(sec) {
        const m = String(Math.floor(sec / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        return `${m}:${s}`;
      }

      function clamp(min, value, max) {
        return Math.max(min, Math.min(max, value));
      }

      function rect(z, sx, sy, cols, rows) {
        const arr = [];
        for (let y = 0; y < rows; y += 1) {
          for (let x = 0; x < cols; x += 1) {
            arr.push({ x: sx + x, y: sy + y, z });
          }
        }
        return arr;
      }

      function ring(z, sx, sy, cols, rows, holeCols, holeRows) {
        const arr = [];
        const hx = Math.floor((cols - holeCols) / 2);
        const hy = Math.floor((rows - holeRows) / 2);
        for (let y = 0; y < rows; y += 1) {
          for (let x = 0; x < cols; x += 1) {
            const inHole = x >= hx && x < hx + holeCols && y >= hy && y < hy + holeRows;
            if (!inHole) arr.push({ x: sx + x, y: sy + y, z });
          }
        }
        return arr;
      }

      function dragonBase() {
        const rowSizes = [8, 10, 12, 12, 10, 8];
        const arr = [];
        rowSizes.forEach((size, y) => {
          const left = Math.floor((12 - size) / 2);
          for (let x = 0; x < size; x += 1) arr.push({ x: left + x, y, z: 0 });
        });
        return arr;
      }

      function layoutPositions(name) {
        const p = name === 'turtle'
          ? [...rect(0, 0, 0, 12, 6), ...rect(1, 1, 1, 10, 4), ...rect(2, 2, 2, 8, 3), ...rect(3, 4, 2, 4, 2)]
          : name === 'castle'
            ? [...rect(0, 0, 0, 12, 6), ...rect(1, 2, 1, 8, 4), ...rect(2, 3, 1, 6, 4), ...rect(3, 4, 1, 4, 4)]
            : name === 'fortress'
              ? [...rect(0, 0, 0, 12, 6), ...ring(1, 1, 1, 10, 4, 6, 2), ...rect(2, 2, 1, 8, 4), ...rect(3, 3, 2, 6, 2)]
              : [...dragonBase(), ...rect(1, 1, 1, 10, 4), ...rect(2, 2, 1, 8, 4), ...rect(3, 3, 2, 6, 2)];
        return p.map((it, i) => ({ id: `t-${i}`, ...it }));
      }

      function deck() {
        const cards = [];
        const suits = {
          dots: ['●一', '●二', '●三', '●四', '●五', '●六', '●七', '●八', '●九'],
          bamboo: ['🀐1', '🀐2', '🀐3', '🀐4', '🀐5', '🀐6', '🀐7', '🀐8', '🀐9'],
          characters: ['萬1', '萬2', '萬3', '萬4', '萬5', '萬6', '萬7', '萬8', '萬9'],
        };
        ['dots', 'bamboo', 'characters'].forEach((suit) => {
          for (let v = 1; v <= 9; v += 1) {
            for (let c = 0; c < 4; c += 1) {
              cards.push({ suit, value: v, symbol: suits[suit][v - 1], label: String(v) });
            }
          }
        });
        ['东', '南', '西', '北'].forEach((s, i) => {
          for (let c = 0; c < 4; c += 1) cards.push({ suit: 'wind', value: i + 1, symbol: s, label: s });
        });
        ['中', '發', '白'].forEach((s, i) => {
          for (let c = 0; c < 4; c += 1) cards.push({ suit: 'dragon', value: i + 1, symbol: s, label: s });
        });
        ['梅', '蘭', '菊', '竹'].forEach((s, i) => cards.push({ suit: 'flower', value: i + 1, symbol: s, label: s }));
        ['春', '夏', '秋', '冬'].forEach((s, i) => cards.push({ suit: 'season', value: i + 1, symbol: s, label: s }));
        return cards;
      }

      function isMatch(a, b) {
        if (a.suit === 'flower' && b.suit === 'flower') return true;
        if (a.suit === 'season' && b.suit === 'season') return true;
        return a.suit === b.suit && a.value === b.value;
      }

      function hasAbove(tile) {
        return state.tiles.some((o) =>
          !o.removed &&
          o.z > tile.z &&
          o.z - tile.z <= 1 &&
          Math.abs(o.x - tile.x) <= 1 &&
          Math.abs(o.y - tile.y) <= 1
        );
      }

      function isFree(tile) {
        if (tile.removed || hasAbove(tile)) return false;
        const left = state.tiles.some((o) => !o.removed && o.id !== tile.id && o.z === tile.z && o.x === tile.x - 1 && o.y === tile.y);
        const right = state.tiles.some((o) => !o.removed && o.id !== tile.id && o.z === tile.z && o.x === tile.x + 1 && o.y === tile.y);
        return !left || !right;
      }

      function updateHud() {
        el.hud.textContent = `Уровень ${state.level} • ${fmt(state.seconds)} • Очки ${state.score}`;
      }

      function updateMenuMeta() {
        el.menuMeta.textContent = `Рекорд: ${state.best ? fmt(state.best) : '—'} • Очки: ${state.score}`;
      }

      function scheduleRender() {
        if (state.renderRaf) return;
        state.renderRaf = requestAnimationFrame(() => {
          state.renderRaf = 0;
          renderBoard();
        });
      }

      function startLevel(level) {
        state.level = level;
        const positions = layoutPositions(LAYOUTS[(level - 1) % LAYOUTS.length]);
        const faces = shuffle(deck());
        state.tiles = positions.map((p, i) => ({ ...p, face: faces[i], removed: false }));
        state.selected = null;
        state.seconds = 0;
        state.running = true;
        el.overlay.classList.remove('show');
        updateHud();
        scheduleRender();
      }

      function openMenu() {
        state.running = false;
        el.overlay.classList.remove('show');
        el.game.classList.add('hidden');
        el.menu.classList.remove('hidden');
        updateMenuMeta();
      }

      function openGame() {
        el.menu.classList.add('hidden');
        el.game.classList.remove('hidden');
        updateViewportVar();
        updateHud();
        scheduleRender();
      }

      function onTileClick(id) {
        if (!state.running) return;
        const tile = state.tiles.find((t) => t.id === id);
        if (!tile || tile.removed || !isFree(tile)) return;

        if (!state.selected) {
          state.selected = id;
          scheduleRender();
          return;
        }

        if (state.selected === id) {
          state.selected = null;
          scheduleRender();
          return;
        }

        const selected = state.tiles.find((t) => t.id === state.selected);
        if (!selected || selected.removed || !isFree(selected)) {
          state.selected = id;
          scheduleRender();
          return;
        }

        if (!isMatch(tile.face, selected.face)) {
          state.selected = id;
          scheduleRender();
          return;
        }

        state.tiles.forEach((t) => {
          if (t.id === tile.id || t.id === selected.id) t.removed = true;
        });

        state.selected = null;
        state.score += 120;
        localStorage.setItem(SCORE_KEY, String(state.score));
        updateHud();

        const remaining = state.tiles.filter((t) => !t.removed).length;
        if (remaining === 0) {
          state.running = false;
          if (state.best === 0 || state.seconds < state.best) {
            state.best = state.seconds;
            localStorage.setItem(BEST_KEY, String(state.best));
          }
          el.modalTitle.textContent = 'Уровень пройден';
          el.modalText.textContent = `Время: ${fmt(state.seconds)} • Очки: ${state.score}`;
          el.overlay.classList.add('show');
        }

        scheduleRender();
      }

      function renderBoard() {
        if (!state.tiles.length) {
          el.board.innerHTML = '';
          return;
        }

        const maxX = Math.max(...state.tiles.map((t) => t.x));
        const maxY = Math.max(...state.tiles.map((t) => t.y));
        const maxZ = Math.max(...state.tiles.map((t) => t.z));
        const shell = el.board.parentElement;
        const width = Math.max(180, shell.clientWidth - 6);
        const height = Math.max(180, shell.clientHeight - 6);

        const maxTileByWidth = width / (maxX + 1 + maxZ * 0.28);
        const maxTileByHeight = height / ((maxY + 1) * 1.35 + maxZ * 0.22);
        const isNarrow = window.innerWidth <= 760;
        const tileW = clamp(isNarrow ? 22 : 26, Math.floor(Math.min(maxTileByWidth, maxTileByHeight)), isNarrow ? 62 : 76);
        const tileH = Math.max(30, Math.floor(tileW * 1.35));
        const layerShift = Math.max(2, Math.floor(tileW * 0.15));
        const gx = Math.max(2, Math.floor(tileW * 0.8));
        const gy = Math.max(2, Math.floor(tileH * 0.76));

        const contentW = maxX * gx + tileW + maxZ * layerShift + 2;
        const contentH = maxY * gy + tileH + maxZ * layerShift + 2;
        const scale = Math.min(1, width / contentW, height / contentH);
        const offsetX = Math.floor((width - contentW * scale) / 2);
        const offsetY = Math.floor((height - contentH * scale) / 2);

        el.board.style.width = `${contentW}px`;
        el.board.style.height = `${contentH}px`;
        el.board.style.transformOrigin = 'left top';
        el.board.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

        const active = state.tiles.filter((t) => !t.removed).sort((a, b) => (a.z - b.z) || (a.y - b.y) || (a.x - b.x));
        const frag = document.createDocumentFragment();

        active.forEach((tile) => {
          const node = document.createElement('button');
          node.className = 'tile';
          if (!isFree(tile)) node.classList.add('blocked');
          if (state.selected === tile.id) node.classList.add('selected');
          node.style.left = `${tile.x * gx + tile.z * layerShift}px`;
          node.style.top = `${tile.y * gy + (maxZ - tile.z) * layerShift}px`;
          node.style.width = `${tileW}px`;
          node.style.height = `${tileH}px`;
          node.style.zIndex = String(100 + tile.z * 10 + tile.y);
          node.disabled = !state.running || !isFree(tile);
          node.dataset.id = tile.id;

          const colorClass = SUIT_COLORS[tile.face.suit] === 'red' ? 'red' : '';
          node.innerHTML = `<div class="tiny ${colorClass}">${tile.face.label}</div><div class="face ${colorClass}">${tile.face.symbol}</div><div class="tiny bottom ${colorClass}">${tile.face.label}</div>`;
          frag.appendChild(node);
        });

        el.board.innerHTML = '';
        el.board.appendChild(frag);
      }

      function tick() {
        if (!state.running) return;
        state.seconds += 1;
        updateHud();
      }

      function tileIdFromEvent(event) {
        const target = event.target instanceof Element ? event.target.closest('.tile') : null;
        return target ? String(target.dataset.id || '') : '';
      }

      el.startBtn.addEventListener('click', () => {
        openGame();
        startLevel(1);
      });

      el.backBtn.addEventListener('click', openMenu);
      el.nextBtn.addEventListener('click', () => startLevel(state.level + 1));
      el.menuBtn.addEventListener('click', openMenu);

      el.board.addEventListener('pointerdown', (event) => {
        const id = tileIdFromEvent(event);
        if (!id) return;
        suppressClickUntil = Date.now() + 350;
        event.preventDefault();
        onTileClick(id);
      }, { passive: false });

      el.board.addEventListener('click', (event) => {
        if (Date.now() < suppressClickUntil) return;
        const id = tileIdFromEvent(event);
        if (!id) return;
        onTileClick(id);
      });

      window.addEventListener('resize', () => {
        updateViewportVar();
        scheduleRender();
      });

      window.addEventListener('orientationchange', () => {
        updateViewportVar();
        scheduleRender();
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          updateViewportVar();
          scheduleRender();
        });
      }

      updateViewportVar();
      state.timerId = setInterval(tick, 1000);
      openMenu();
    })();
  </script>
</body>
</html>

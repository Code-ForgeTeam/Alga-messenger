<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pyrga Titan Online</title>
  <style>
    :root {
      --vh: 1vh;
      --bg-top: #f7fbff;
      --bg-bottom: #e9f2fb;
      --panel: #ffffff;
      --line: #d5e4f2;
      --ink: #203248;
      --soft: #6b7f96;
      --accent: #3f84e8;
      --accent-2: #2f71d1;
      --shadow: 0 12px 28px rgba(31, 56, 86, 0.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: calc(var(--vh) * 100);
      overflow: hidden;
      font-family: "SF Pro Text", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      overscroll-behavior: none;
    }

    .hidden {
      display: none !important;
    }

    .menu {
      width: 100%;
      height: calc(var(--vh) * 100);
      display: grid;
      place-items: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 16px)
        16px
        calc(env(safe-area-inset-bottom, 0px) + 16px);
    }

    .menu-card {
      width: min(560px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 18px;
      text-align: center;
    }

    .menu-title {
      margin: 0;
      font-size: clamp(28px, 6vw, 42px);
      letter-spacing: 0.3px;
    }

    .menu-subtitle {
      margin: 8px 0 16px;
      color: var(--soft);
      font-size: 15px;
    }

    .menu-options {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
      text-align: left;
    }

    .menu-field {
      display: grid;
      gap: 6px;
    }

    .menu-field label {
      font-size: 13px;
      color: var(--soft);
      font-weight: 700;
    }

    .menu-field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      outline: none;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: #fff;
      color: var(--ink);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn.primary {
      background: linear-gradient(180deg, #5ea2f4, #3a82e8);
      border-color: #3a82e8;
      color: #fff;
    }

    .menu-meta {
      margin-top: 12px;
      color: var(--soft);
      font-size: 14px;
      line-height: 1.5;
    }

    .game {
      width: 100%;
      height: calc(var(--vh) * 100);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      padding:
        calc(env(safe-area-inset-top, 0px) + 8px)
        max(env(safe-area-inset-right, 0px), 8px)
        calc(env(safe-area-inset-bottom, 0px) + 8px)
        max(env(safe-area-inset-left, 0px), 8px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .back {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(30, 54, 84, 0.18);
    }

    .hud {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: #35506d;
      font-weight: 800;
      font-size: 12px;
      padding: 8px 12px;
      text-align: center;
      box-shadow: 0 8px 18px rgba(30, 54, 84, 0.15);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shuffle {
      border-radius: 12px;
      border: 1px solid #4f89df;
      background: linear-gradient(180deg, #6ba8f5, #3e7fdf);
      color: #fff;
      height: 44px;
      min-width: 84px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(34, 78, 145, 0.22);
    }

    .shuffle:disabled {
      cursor: default;
      opacity: 0.55;
      box-shadow: none;
    }

    .board-shell {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff, #f6faff);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 260px;
    }

    .board {
      position: absolute;
      left: 0;
      top: 0;
      will-change: transform;
      touch-action: manipulation;
    }

    .tile {
      position: absolute;
      border: 1px solid #cadbee;
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff, #f4f8ff);
      box-shadow: 0 4px 10px rgba(21, 44, 72, 0.15);
      display: grid;
      place-items: center;
      color: #1f2f44;
      font-weight: 800;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
      padding: 0;
    }

    .tile.blocked {
      filter: saturate(0.7) grayscale(0.2);
      background: linear-gradient(180deg, #eaf1f9, #dfebf7);
      box-shadow: 0 2px 5px rgba(21, 44, 72, 0.1);
      cursor: default;
    }

    .tile .face {
      font-size: 28px;
      line-height: 1;
    }

    .tray-shell {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .tray-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #3a5572;
      font-weight: 700;
      font-size: 13px;
    }

    .tray-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .tray-slot {
      height: 56px;
      border-radius: 10px;
      border: 1px dashed #b9cee4;
      background: linear-gradient(180deg, #f9fcff, #f2f7ff);
      display: grid;
      place-items: center;
      color: #8ca2ba;
      font-weight: 700;
      font-size: 13px;
    }

    .tray-slot .face {
      color: #213650;
      font-size: 26px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(9, 17, 29, 0.42);
      z-index: 100;
      padding: 16px;
    }

    .overlay.show {
      display: grid;
    }

    .modal {
      width: min(420px, 100%);
      background: #fff;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 16px;
      text-align: center;
    }

    .modal p {
      color: var(--soft);
      margin: 10px 0 14px;
    }

    .modal .row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 760px) {
      .game {
        gap: 7px;
        padding:
          calc(env(safe-area-inset-top, 0px) + 6px)
          max(env(safe-area-inset-right, 0px), 6px)
          calc(env(safe-area-inset-bottom, 0px) + 6px)
          max(env(safe-area-inset-left, 0px), 6px);
      }

      .back {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }

      .shuffle {
        height: 40px;
        min-width: 78px;
        font-size: 12px;
      }

      .hud {
        font-size: 11px;
        padding: 6px 9px;
      }

      .tray-slot {
        height: 52px;
      }

      .tile .face {
        font-size: 25px;
      }
    }
  </style>
</head>
<body>
  <section id="menuScreen" class="menu">
    <div class="menu-card">
      <h1 class="menu-title">Pyrga Titan</h1>
      <p class="menu-subtitle">╨Ю╨╜╨╗╨░╨╣╨╜-╤А╨╡╨╢╨╕╨╝: 4 ╤П╤З╨╡╨╣╨║╨╕, ╨┐╨░╤А╤Л ╤Б╤Е╨╗╨╛╨┐╤Л╨▓╨░╤О╤В╤Б╤П ╨░╨▓╤В╨╛╨╝╨░╤В╨╕╤З╨╡╤Б╨║╨╕</p>

      <div class="menu-options">
        <div class="menu-field">
          <label for="themeSelect">╨в╨╡╨╝╨░</label>
          <select id="themeSelect">
            <option value="classic">╨Ъ╨╗╨░╤Б╤Б╨╕╨║╨░</option>
            <option value="forest">╨Ы╨╡╤Б</option>
            <option value="night">╨Э╨╛╤З╤М</option>
          </select>
        </div>

        <div class="menu-field">
          <label for="layoutSelect">╨а╨░╤Б╨║╨╗╨░╨┤</label>
          <select id="layoutSelect">
            <option value="turtle">Turtle</option>
            <option value="castle">Castle</option>
            <option value="fortress">Fortress</option>
            <option value="dragon">Dragon</option>
          </select>
        </div>

        <div class="menu-field">
          <label for="deckSelect">╨Ъ╨░╤А╤В╨╛╤З╨║╨╕</label>
          <select id="deckSelect">
            <option value="classic">╨Ъ╨╗╨░╤Б╤Б╨╕╤З╨╡╤Б╨║╨╕╨╡</option>
            <option value="icons">IT ╨╕╨║╨╛╨╜╨║╨╕</option>
          </select>
        </div>
      </div>

      <button id="startBtn" class="btn primary">╨Э╨░╤З╨░╤В╤М</button>
      <div id="menuMeta" class="menu-meta"></div>
    </div>
  </section>

  <section id="gameScreen" class="game hidden">
    <div class="toolbar">
      <button id="backBtn" class="back" aria-label="╨Э╨░╨╖╨░╨┤">тЖР</button>
      <div id="hud" class="hud"></div>
      <button id="shuffleBtn" class="shuffle">╨Ь╨╕╨║╤Б ├Ч3</button>
    </div>

    <div class="board-shell">
      <div id="board" class="board"></div>
    </div>

    <div class="tray-shell">
      <div class="tray-head">
        <span id="trayLabel">╨п╤З╨╡╨╣╨║╨╕ 0/4</span>
        <span id="pairLabel">╨Я╨░╤А╤Л 0/48</span>
      </div>
      <div id="trayGrid" class="tray-grid"></div>
    </div>
  </section>

  <div id="overlay" class="overlay">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <div class="row">
        <button id="retryBtn" class="btn primary">╨Э╨╛╨▓╨░╤П ╨┐╨░╤А╤В╨╕╤П</button>
        <button id="nextBtn" class="btn">╨б╨╗╨╡╨┤╤Г╤О╤Й╨╕╨╣ ╤Г╤А╨╛╨▓╨╡╨╜╤М</button>
        <button id="menuBtn" class="btn">╨Т ╨╝╨╡╨╜╤О</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const BEST_KEY = 'pyrga.online.best.v2';
      const WINS_KEY = 'pyrga.online.wins.v2';
      const SCORE_KEY = 'pyrga.online.score.v2';
      const TRAY_CAPACITY = 4;
      const SHUFFLES_PER_GAME = 3;
      const LAYOUTS = ['turtle', 'castle', 'fortress', 'dragon'];

      const THEMES = {
        classic: { top: '#f7fbff', bottom: '#e9f2fb', panel: '#ffffff' },
        forest: { top: '#f4fff7', bottom: '#def3e6', panel: '#fbfff9' },
        night: { top: '#11192b', bottom: '#0b1426', panel: '#17233a' },
      };

      const DECKS = {
        classic: ['ЁЯАЩ', 'ЁЯАЪ', 'ЁЯАЫ', 'ЁЯАЬ', 'ЁЯАЭ', 'ЁЯАЮ', 'ЁЯАЯ', 'ЁЯАа', 'ЁЯАб', 'ЁЯАР', 'ЁЯАС', 'ЁЯАТ', 'ЁЯАУ', 'ЁЯАФ', 'ЁЯАХ', 'ЁЯАЦ', 'ЁЯАЧ', 'ЁЯАШ', 'ЁЯАЗ', 'ЁЯАИ', 'ЁЯАЙ', 'ЁЯАК', 'ЁЯАЛ', 'ЁЯАМ'],
        icons: ['тМи', 'ЁЯЦе', 'ЁЯТ╛', 'ЁЯза', 'тЪЩ', 'ЁЯФМ', 'ЁЯЫ░', 'ЁЯУб', 'ЁЯЫб', 'ЁЯзй', 'ЁЯФС', 'ЁЯФТ', 'ЁЯЪА', 'ЁЯзк', 'ЁЯз▒', 'ЁЯЫа', 'ЁЯУж', 'ЁЯХ╣', 'ЁЯТб', 'ЁЯЦ▒', 'ЁЯзм', 'ЁЯЧД', 'ЁЯФЛ', 'ЁЯУ▒'],
      };

      const state = {
        level: 1,
        score: Number(localStorage.getItem(SCORE_KEY) || 0),
        wins: Number(localStorage.getItem(WINS_KEY) || 0),
        best: Number(localStorage.getItem(BEST_KEY) || 0),
        seconds: 0,
        moves: 0,
        running: false,
        timerId: null,
        tiles: [],
        tray: [],
        layout: 'turtle',
        deck: 'classic',
        theme: 'classic',
        reshufflesLeft: SHUFFLES_PER_GAME,
        raf: 0,
      };

      const el = {
        menu: document.getElementById('menuScreen'),
        game: document.getElementById('gameScreen'),
        menuMeta: document.getElementById('menuMeta'),
        themeSelect: document.getElementById('themeSelect'),
        layoutSelect: document.getElementById('layoutSelect'),
        deckSelect: document.getElementById('deckSelect'),
        startBtn: document.getElementById('startBtn'),
        board: document.getElementById('board'),
        hud: document.getElementById('hud'),
        trayGrid: document.getElementById('trayGrid'),
        trayLabel: document.getElementById('trayLabel'),
        pairLabel: document.getElementById('pairLabel'),
        shuffleBtn: document.getElementById('shuffleBtn'),
        backBtn: document.getElementById('backBtn'),
        overlay: document.getElementById('overlay'),
        modalTitle: document.getElementById('modalTitle'),
        modalText: document.getElementById('modalText'),
        retryBtn: document.getElementById('retryBtn'),
        nextBtn: document.getElementById('nextBtn'),
        menuBtn: document.getElementById('menuBtn'),
      };

      function updateViewportVar() {
        const vv = window.visualViewport;
        const h = (vv ? vv.height : window.innerHeight) * 0.01;
        document.documentElement.style.setProperty('--vh', `${h}px`);
      }

      function clamp(min, value, max) {
        return Math.max(min, Math.min(max, value));
      }

      function fmt(sec) {
        const s = Math.max(0, Math.floor(sec));
        const mm = String(Math.floor(s / 60)).padStart(2, '0');
        const ss = String(s % 60).padStart(2, '0');
        return `${mm}:${ss}`;
      }

      function shuffle(list) {
        const a = list.slice();
        for (let i = a.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function rect(z, sx, sy, cols, rows) {
        const arr = [];
        for (let y = 0; y < rows; y += 1) {
          for (let x = 0; x < cols; x += 1) {
            arr.push({ x: sx + x, y: sy + y, z });
          }
        }
        return arr;
      }

      function ring(z, sx, sy, cols, rows, holeCols, holeRows) {
        const arr = [];
        const hx = Math.floor((cols - holeCols) / 2);
        const hy = Math.floor((rows - holeRows) / 2);
        for (let y = 0; y < rows; y += 1) {
          for (let x = 0; x < cols; x += 1) {
            const inHole = x >= hx && x < hx + holeCols && y >= hy && y < hy + holeRows;
            if (!inHole) arr.push({ x: sx + x, y: sy + y, z });
          }
        }
        return arr;
      }

      function dragonBase() {
        const rowSizes = [8, 10, 12, 10, 8];
        const arr = [];
        rowSizes.forEach((size, y) => {
          const left = Math.floor((12 - size) / 2);
          for (let x = 0; x < size; x += 1) {
            arr.push({ x: left + x, y, z: 0 });
          }
        });
        return arr;
      }

      function layoutPositions(name) {
        if (name === 'castle') {
          return [...rect(0, 0, 0, 12, 6), ...rect(1, 3, 1, 6, 4)];
        }
        if (name === 'fortress') {
          return [...rect(0, 1, 0, 10, 6), ...ring(1, 2, 1, 8, 4, 4, 2), ...rect(2, 4, 1, 4, 3)];
        }
        if (name === 'dragon') {
          return [...dragonBase(), ...rect(1, 2, 1, 8, 4), ...rect(2, 4, 1, 4, 4)];
        }
        return [...rect(0, 1, 0, 10, 6), ...rect(1, 2, 1, 8, 4), ...rect(2, 4, 2, 4, 1)];
      }

      function buildFaces(tileCount) {
        const symbols = DECKS[state.deck] || DECKS.classic;
        const pairs = Math.floor(tileCount / 2);
        const faces = [];
        for (let i = 0; i < pairs; i += 1) {
          const symbol = symbols[i % symbols.length];
          // key must be symbol-level so visually identical cards always match,
          // even when the same symbol is repeated across large layouts.
          const face = { key: symbol, symbol };
          faces.push(face, { ...face });
        }
        return shuffle(faces);
      }

      function buildLevel(level) {
        const selectedIndex = Math.max(0, LAYOUTS.indexOf(state.layout));
        const layout = LAYOUTS[(selectedIndex + Math.max(0, level - 1)) % LAYOUTS.length];
        const positions = layoutPositions(layout);
        const faces = buildFaces(positions.length);
        state.tiles = positions.map((item, index) => ({
          id: `t-${layout}-${index}`,
          x: item.x,
          y: item.y,
          z: item.z,
          face: faces[index],
          removed: false,
        }));
        state.tray = [];
        state.moves = 0;
        state.seconds = 0;
        state.reshufflesLeft = SHUFFLES_PER_GAME;
        state.level = level;
        state.running = true;
        el.overlay.classList.remove('show');
        updateHud();
        renderTray();
        scheduleRender();
      }

      function isFree(tile) {
        if (!tile || tile.removed) return false;
        const hasAbove = state.tiles.some((o) => !o.removed && o.z > tile.z && o.x === tile.x && o.y === tile.y);
        if (hasAbove) return false;
        const left = state.tiles.some((o) => !o.removed && o.id !== tile.id && o.z === tile.z && o.y === tile.y && o.x === tile.x - 1);
        const right = state.tiles.some((o) => !o.removed && o.id !== tile.id && o.z === tile.z && o.y === tile.y && o.x === tile.x + 1);
        return !left || !right;
      }

      function collapseTrayPairs() {
        let changed = true;
        while (changed) {
          changed = false;
          const seen = new Map();
          for (let i = 0; i < state.tray.length; i += 1) {
            const key = state.tray[i].face.symbol;
            if (seen.has(key)) {
              const first = seen.get(key);
              state.tray = state.tray.filter((_, index) => index !== first && index !== i);
              state.score += 120;
              localStorage.setItem(SCORE_KEY, String(state.score));
              changed = true;
              break;
            }
            seen.set(key, i);
          }
        }
      }

      function remainingTiles() {
        return state.tiles.filter((tile) => !tile.removed).length;
      }

      function finishGame(win) {
        state.running = false;
        if (win) {
          state.wins += 1;
          localStorage.setItem(WINS_KEY, String(state.wins));
          if (state.best === 0 || state.seconds < state.best) {
            state.best = state.seconds;
            localStorage.setItem(BEST_KEY, String(state.best));
          }
          el.modalTitle.textContent = '╨г╤А╨╛╨▓╨╡╨╜╤М ╨┐╤А╨╛╨╣╨┤╨╡╨╜';
          el.modalText.textContent = `╨Т╤А╨╡╨╝╤П: ${fmt(state.seconds)} тАв ╨Ю╤З╨║╨╕: ${state.score}`;
        } else {
          el.modalTitle.textContent = '╨Я╨╛╤А╨░╨╢╨╡╨╜╨╕╨╡';
          el.modalText.textContent = '╨п╤З╨╡╨╣╨║╨╕ ╨╖╨░╨┐╨╛╨╗╨╜╨╡╨╜╤Л. ╨Ш╤Б╨┐╨╛╨╗╤М╨╖╤Г╨╣╤В╨╡ ╨┐╨╡╤А╨╡╨╝╨╡╤И╨║╤Г ╤А╨░╨╜╤М╤И╨╡.';
        }
        el.overlay.classList.add('show');
        updateHud();
        renderTray();
      }

      function onTileTap(tileId) {
        if (!state.running) return;
        if (state.tray.length >= TRAY_CAPACITY) return;

        const tile = state.tiles.find((item) => item.id === tileId);
        if (!tile || tile.removed || !isFree(tile)) return;

        tile.removed = true;
        state.tray.push({ tileId: tile.id, face: tile.face });
        state.moves += 1;
        collapseTrayPairs();

        const rest = remainingTiles();
        if (rest === 0 && state.tray.length === 0) {
          finishGame(true);
        } else if (state.tray.length >= TRAY_CAPACITY) {
          finishGame(false);
        } else {
          updateHud();
          renderTray();
          scheduleRender();
        }
      }

      function reshuffleBoard() {
        if (!state.running || state.reshufflesLeft <= 0) return;
        const activeFaces = shuffle(state.tiles.filter((item) => !item.removed).map((item) => item.face));
        let cursor = 0;
        state.tiles.forEach((tile) => {
          if (tile.removed) return;
          tile.face = activeFaces[cursor];
          cursor += 1;
        });
        state.reshufflesLeft -= 1;
        updateHud();
        scheduleRender();
      }

      function applyTheme(key) {
        const theme = THEMES[key] || THEMES.classic;
        document.documentElement.style.setProperty('--bg-top', theme.top);
        document.documentElement.style.setProperty('--bg-bottom', theme.bottom);
        document.documentElement.style.setProperty('--panel', theme.panel);
      }

      function updateHud() {
        const totalPairs = Math.floor(state.tiles.length / 2);
        const completedPairs = Math.floor((state.tiles.length - remainingTiles() - state.tray.length) / 2);
        el.hud.textContent = `L${state.level} тАв ${fmt(state.seconds)} тАв ╨Ю╤З╨║╨╕ ${state.score} тАв ╨е╨╛╨┤╤Л ${state.moves}`;
        el.shuffleBtn.textContent = `╨Ь╨╕╨║╤Б ├Ч${state.reshufflesLeft}`;
        el.shuffleBtn.disabled = !state.running || state.reshufflesLeft <= 0;
        el.trayLabel.textContent = `╨п╤З╨╡╨╣╨║╨╕ ${state.tray.length}/${TRAY_CAPACITY}`;
        el.pairLabel.textContent = `╨Я╨░╤А╤Л ${completedPairs}/${totalPairs}`;
      }

      function updateMenuMeta() {
        const best = state.best > 0 ? fmt(state.best) : 'тАФ';
        el.menuMeta.textContent = `╨а╨╡╨║╨╛╤А╨┤: ${best} тАв ╨Я╨╛╨▒╨╡╨┤╤Л: ${state.wins} тАв ╨Ю╤З╨║╨╕: ${state.score}`;
      }

      function scheduleRender() {
        if (state.raf) return;
        state.raf = requestAnimationFrame(() => {
          state.raf = 0;
          renderBoard();
        });
      }

      function renderBoard() {
        if (!state.tiles.length) {
          el.board.innerHTML = '';
          return;
        }

        const active = state.tiles.filter((tile) => !tile.removed).sort((a, b) => (a.z - b.z) || (a.y - b.y) || (a.x - b.x));
        if (!active.length) {
          el.board.innerHTML = '';
          return;
        }

        const maxX = Math.max(...state.tiles.map((tile) => tile.x));
        const maxY = Math.max(...state.tiles.map((tile) => tile.y));
        const maxZ = Math.max(...state.tiles.map((tile) => tile.z));

        const shell = el.board.parentElement;
        const width = Math.max(220, shell.clientWidth - 4);
        const height = Math.max(220, shell.clientHeight - 4);
        const isNarrow = window.innerWidth <= 760;

        const byWidth = width / (maxX + 1 + maxZ * 0.5);
        const byHeight = height / ((maxY + 1) * 1.22 + maxZ * 0.35);
        const tileW = clamp(isNarrow ? 34 : 40, Math.floor(Math.min(byWidth, byHeight)), isNarrow ? 82 : 92);
        const tileH = Math.max(42, Math.floor(tileW * 1.24));
        const stepX = Math.max(16, Math.floor(tileW * 0.88));
        const stepY = Math.max(14, Math.floor(tileH * 0.72));
        const lift = Math.max(3, Math.floor(tileW * 0.2));

        const contentW = maxX * stepX + tileW + maxZ * lift + 4;
        const contentH = maxY * stepY + tileH + maxZ * lift + 4;
        let scale = Math.min(width / contentW, height / contentH);
        if (!Number.isFinite(scale) || scale <= 0) scale = 1;
        scale = clamp(0.68, scale, 1.42);

        const offsetX = Math.floor((width - contentW * scale) / 2);
        const offsetY = Math.floor((height - contentH * scale) / 2);

        el.board.style.width = `${contentW}px`;
        el.board.style.height = `${contentH}px`;
        el.board.style.transformOrigin = 'left top';
        el.board.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

        const frag = document.createDocumentFragment();
        active.forEach((tile) => {
          const free = isFree(tile);
          const node = document.createElement('button');
          node.className = `tile${free ? '' : ' blocked'}`;
          node.dataset.id = tile.id;
          node.disabled = !state.running || !free || state.tray.length >= TRAY_CAPACITY;
          node.style.left = `${tile.x * stepX + tile.z * lift}px`;
          node.style.top = `${tile.y * stepY + (maxZ - tile.z) * lift}px`;
          node.style.width = `${tileW}px`;
          node.style.height = `${tileH}px`;
          node.style.zIndex = String(100 + tile.z * 20 + tile.y);
          node.innerHTML = `<span class="face">${tile.face.symbol}</span>`;
          frag.appendChild(node);
        });

        el.board.innerHTML = '';
        el.board.appendChild(frag);
      }

      function renderTray() {
        const frag = document.createDocumentFragment();
        for (let i = 0; i < TRAY_CAPACITY; i += 1) {
          const slot = document.createElement('div');
          slot.className = 'tray-slot';
          const item = state.tray[i];
          slot.innerHTML = item ? `<span class="face">${item.face.symbol}</span>` : '┬╖';
          frag.appendChild(slot);
        }
        el.trayGrid.innerHTML = '';
        el.trayGrid.appendChild(frag);
      }

      function openMenu() {
        state.running = false;
        el.overlay.classList.remove('show');
        el.game.classList.add('hidden');
        el.menu.classList.remove('hidden');
        updateMenuMeta();
      }

      function openGame() {
        el.menu.classList.add('hidden');
        el.game.classList.remove('hidden');
        updateViewportVar();
        updateHud();
        renderTray();
        scheduleRender();
      }

      function tick() {
        if (!state.running) return;
        state.seconds += 1;
        updateHud();
      }

      function tileIdFromEvent(event) {
        const target = event.target instanceof Element ? event.target.closest('.tile') : null;
        return target ? String(target.dataset.id || '') : '';
      }

      function startGameAtLevel(level) {
        buildLevel(level);
        openGame();
      }

      el.startBtn.addEventListener('click', () => {
        state.theme = String(el.themeSelect.value || 'classic');
        state.layout = String(el.layoutSelect.value || 'turtle');
        state.deck = String(el.deckSelect.value || 'classic');
        applyTheme(state.theme);
        startGameAtLevel(1);
      });

      el.themeSelect.addEventListener('change', () => {
        state.theme = String(el.themeSelect.value || 'classic');
        applyTheme(state.theme);
      });

      el.layoutSelect.addEventListener('change', () => {
        state.layout = String(el.layoutSelect.value || 'turtle');
      });

      el.deckSelect.addEventListener('change', () => {
        state.deck = String(el.deckSelect.value || 'classic');
      });

      el.backBtn.addEventListener('click', openMenu);
      el.shuffleBtn.addEventListener('click', reshuffleBoard);

      el.retryBtn.addEventListener('click', () => startGameAtLevel(1));
      el.nextBtn.addEventListener('click', () => startGameAtLevel(state.level + 1));
      el.menuBtn.addEventListener('click', openMenu);

      let suppressClickUntil = 0;
      el.board.addEventListener('pointerdown', (event) => {
        const id = tileIdFromEvent(event);
        if (!id) return;
        suppressClickUntil = Date.now() + 260;
        event.preventDefault();
        onTileTap(id);
      }, { passive: false });

      el.board.addEventListener('click', (event) => {
        if (Date.now() < suppressClickUntil) return;
        const id = tileIdFromEvent(event);
        if (!id) return;
        onTileTap(id);
      });

      window.addEventListener('resize', () => {
        updateViewportVar();
        scheduleRender();
      });
      window.addEventListener('orientationchange', () => {
        updateViewportVar();
        scheduleRender();
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          updateViewportVar();
          scheduleRender();
        });
      }

      updateViewportVar();
      applyTheme(state.theme);
      updateMenuMeta();
      renderTray();
      state.timerId = window.setInterval(tick, 1000);
      openMenu();
    })();
  </script>
</body>
</html>
